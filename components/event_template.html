<div class="event-page-shell">
    <div id="event-page-inner">
        <div class="event-page-topbar">
            <button class="button event-back-button" type="button" id="close-event-template">Go Back</button>
        </div>

        <h2>Event Page</h2>

        <div class="card clearfix">
            <h3>
                <strong>Event name</strong>
                <input type="text" placeholder="Name of your event">
            </h3>

            <div class="section">
                <strong>Date</strong>
                <input type="text" placeholder="Event date (e.g. March 28, 2026)">
            </div>

            <div class="section">
                <strong>Time</strong>
                <input type="text" placeholder="Event time (e.g. 15:00-00:00)">
            </div>
        </div>

        <div class="card">
            <strong>Location</strong>
            <input type="text" placeholder="Event location">
        </div>

        <div class="card">
            <strong>Description</strong>
            <textarea placeholder="Write event description here"></textarea>
        </div>

        <div class="card">
            <strong>Practical Information</strong>
            <input type="text" placeholder="Info">
        </div>

        <div class="event-page-actions">
            <button class="button event-publish-button" type="button">Publish event</button>
        </div>
    </div>
</div>
