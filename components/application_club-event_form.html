<div id="create-club-or-event-inner">
  <h2>Application to create a Club or Event</h2>

  <form id="application_for_club_or_event_form">
    <p>Your Details</p>
    <input type="text" name="full_name" placeholder="Your Name" required />
    <input type="email" name="email" placeholder="Email" required />
    <input type="text" name="education" placeholder="Education" required />
    <input type="text" name="phone_number" placeholder="Phone Number" required />

    <p>Your Project</p>
    <div class="checkbox-group">
      <label>
        <input type="checkbox" id="checkBoxClub" name="create_club" />
        Create Club
      </label>
      <label>
        <input type="checkbox" id="checkBoxEvent" name="create_event" />
        Create Event
      </label>
    </div>

    <div class="form-row">
      <input type="text" name="project_name" placeholder="Club/Event Name" required />
      <input type="text" name="category" placeholder="Category" required />
    </div>

    <div class="form-row">
      <textarea name="idea_description" placeholder="Tell us about your idea" required></textarea>
      <textarea name="motivation" placeholder="What motivates you?" required></textarea>
    </div>

    <p id="application-form-status" aria-live="polite"></p>

    <div class="button-container button-container-horizontal">
      <button class="role-button" type="submit">Send application</button>
      <button class="role-button" type="button" id="close-page">Go Back</button>
    </div>
  </form>
</div>
