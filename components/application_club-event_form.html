<div id="create-club-or-event-inner">
  <button class="role-button" type="button" id="close-page">Go Back</button>
  <h2>Application to create a Club or Event</h2>

  <form id="application_for_club_or_event_form">
    <p>Your Details</p>
    <input type="text" placeholder="Your Name" required />
    <input type="email" placeholder="Email" required />
    <input type="text" placeholder="Education" required />
    <input type="text" placeholder="Phone Number" required />

    <p>Your Project</p>
    <div class="checkbox-group">
      <label>
        <input type="checkbox" id="checkBoxClub" />
        Create Club
      </label>
      <label>
        <input type="checkbox" id="checkBoxEvent" />
        Create Event
      </label>
    </div>

    <div id="event-filter-box" style="display: none; margin: 10px 0; padding: 15px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 8px;">
  <label for="eventScope" style="display: block; margin-bottom: 8px; font-weight: bold; color: #333;">
    Hvem skal kunne se dette event?
  </label>
  <select id="eventScope" name="eventScope" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; background-color: white; cursor: pointer;">
    <option value="global">Globalt (Alle kan se det)</option>
    <option value="club">Kun for klubbens medlemmer</option>
  </select>
</div>

    <div class="form-row">
      <input type="text" placeholder="Club/Event Name" required />
      <input type="text" placeholder="Category" required />
    </div>

    <div class="form-row">
      <textarea placeholder="Tell us about your idea"></textarea>
      <textarea placeholder="What motivates you?"></textarea>
    </div>

    <div class="button-container button-container-horizontal">
      <button class="role-button primary-button" type="submit">Send application</button>
    </div>
  </form>
</div>
