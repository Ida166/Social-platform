<div class="content-area">
    <h1>Events & clubs - Informationssite - ${club.name}</h1>

    <div class="white-box">
        <div class="hero">
            <img src="${club.image}" alt="${club.name}">
        </div>

        <div class="description">
            <p><strong>Join us!</strong><br>
            ${club.description}</p>
        </div>

        <div class="info-section">
            <div class="info-card">
                <h3>Current members:</h3>
                <p>${club.memberCount || 'TBA'}</p>
                <h3>Contact info:</h3>
                <p>${club.contactEmail || 'No email provided'}</p>
                <p>${club.phone || ''}</p>
            </div>

            <button class="join-btn">Join us</button>
        </div>

        <div class="event-section">
            <h2>Kommende Events</h2>
            <!-- JS finder denne container og fylder den vha. templaten herunder -->
            <div id="club-events-container"></div> 
        </div>

        <button id="close-event-page" class="back-btn">Go Back</button>
    </div>
</div>

<!-- Template til et event-kort (Bageformen) -->
<template id="event-card-template">
    <div class="event-card">
        <h3 class="event-title"></h3>
        <p><strong>Dato:</strong> <span class="event-date"></span></p>
        <p><strong>Tid:</strong> <span class="event-time"></span></p>
        <p><strong>Sted:</strong> <span class="event-location"></span></p>
    </div>
</template>
