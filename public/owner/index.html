<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MapOut - Dashboard</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/roles/user.css" />
    <link rel="stylesheet" href="/css/roles/admin.css" />
    <link rel="stylesheet" href="/css/commponents/club_card.css" /> 
    <link rel="stylesheet" href="/css/roles/club_owner.css" />
    <link rel="stylesheet" href="/css/commponents/event_card.css" />
    <link rel="stylesheet" href="/css/commponents/event_template.css" />  
     <link rel="stylesheet" href="/css/commponents/event_details.css">
  </head>
  <body>
    <div class="side">
      <!--Here the sidebar of the page is located-->
      <aside class="sidebar">
        <div class="sidebartop">
          <img class="AAU-image-sidebar" src="/assets/images/AAU-Logo-sidebar.png" alt="Aalborg University Logo">
          <div class="menu-item">Dashboard</div>
          <div class="menu-item">Calendar</div>
          <div class="menu-item">CalMoodle</div>
          <div class="menu-item">Events & clubs</div>
        </div>
        <div class="sidebarbottom">
          <div class="menu-item">Courses shortcut</div>
          <div class="menu-item">Search</div>
          <div class="menu-item">Courses xx</div>
        </div>
      </aside>

      <!--Here the main side of the page is located-->
      <div class="main">
        <div style="margin-top:6px"></div>

        <!--Club list container -->
        <div id="club-list-box" class="hidden"></div> <!--Find the content in the file components/club_list.html-->
         <div id="eventlist-page-box" class="hidden"></div> <!--Find the content in the file components/even_list.html-->
        <!--Event page container-->
        <div id="event-page-box" class="hidden"></div>

                  <!--Full eventlist-->
        <div id="eventlist-page-box" class="hidden">
        <div class="full-eventlist-container"></div>
          </div>

        <div id="dashboard-home">
          <div class="page-title">
            <h1>
              Events & clubs 
            </h1>
            <div class="button-group">
              <button class="role-button blue-btn" id="createEventButton">Create Event</button>
              <div id="create-club-or-event_box" class="hidden"></div>
              <button class="role-button" id="logOut">Log Out</button>
            </div>
          </div>
          <div class="subtitle">
            <h3><button class="list-link-btn" id="clubListLink">Show Full Club List</button> |
              <button class="list-link-btn" id="eventListLink">Show Full Event List</button>
            </h3>
          </div>
          <div class="filter">
            <h3>Filters</h3>
          </div>
          <div style="display:flex; justify-content: start; align-items: center;">
              <h2 id="currentDate"></h2>
              <div style="width: 300px;" class="datofilter"></div>
          </div>

          <!--selve kalenderen-->
          <div class="calendarcontainer">
            <div class="header">
            <button id="previousWeek">←</button>
              <ul class="weekdays">
                <li>Mon <span id="day1"></span></li>
                <li>Tue <span id="day2"></span></li>
                <li>Wed <span id="day3"></span></li>
                <li>Thu <span id="day4"></span></li>
                <li>Fri <span id="day5"></span></li>
                <li>Sat <span id="day6"></span></li>
                <li>Sun <span id="day7"></span></li>
              </ul>
            <button id="nextWeek">→</button>
              </div>
                <div class="timeslotscontainer">
                    <ul class="timeslots"> </ul>
                </div>
                <div class="eventcontainer"></div>
             </div>
           <script type="module" src="/JS/core/calendar.js"></script>
        </div>
        </div>
      </div>
    </div>

    <script type="module" src="/js/pages/dashboardPage.js"></script>
    
  </body>
</html>
